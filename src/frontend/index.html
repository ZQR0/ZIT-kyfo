<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYFO — Авиакомпания</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-brand">
            <h1>KYFO</h1>
            <p class="subtitle">Система компенсаций при задержке рейсов</p>
        </div>
        <nav class="header-nav">
            <button class="tab active" data-tab="airline">Личный кабинет</button>
            <button class="tab" data-tab="cafe">Терминал кафе</button>
        </nav>
    </header>


    <main>
        <!-- ЛК -->
        <section id="airline" class="panel active">
            <div id="login-block" class="card">
                <h2>Вход</h2>
                <form id="login-form">
                    <label>
                        Логин
                        <input type="text" id="login" placeholder="login" required>
                    </label>
                    <label>
                        Пароль
                        <input type="password" id="password" placeholder="*******" required>
                    </label>
                    <button type="submit">Войти</button>
                </form>
            </div>

            <div id="cabinet-block" class="hidden">
                <div class="toolbar">
                    <span id="airline-name"></span>
                    <button id="logout-btn" class="secondary">Выйти</button>
                </div>

                <div class="card">
                    <div class="card-toolbar">
                        <h2>Рейсы</h2>
                        <div class="card-actions">
                            <label class="filter-checkbox">
                                <input type="checkbox" id="filter-delayed">
                                Только задержанные (от 2 ч)
                            </label>
                            <button id="load-flights">Обновить</button>
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table id="flights-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Авиакомпания</th>
                                    <th>Маршрут</th>
                                    <th>Вылет</th>
                                    <th>Прилёт</th>
                                    <th>Задержка</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h2>Посадочные талоны</h2>
                    <button id="load-tickets">Обновить</button>
                    <div class="table-wrap">
                        <table id="tickets-table">
                            <thead>
                                <tr>
                                    <th>Номер</th>
                                    <th>Рейс</th>
                                    <th>Место</th>
                                    <th>Баланс</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h2>Начисление компенсации</h2>
                    <form id="topup-form" class="inline-form">
                        <label class="flight-select-label">
                            Рейс
                            <select id="topup-flight-id" required></select>
                        </label>
                        <label>Сумма <input type="number" id="topup-amount" step="0.01" min="0.01" required></label>
                        <label>
                            Точка обслуживания
                            <select id="topup-point-id" required></select>
                        </label>
                        <button type="submit">Начислить</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Страница кафе -->
        <section id="cafe" class="panel">
            <div class="card">
                <h2>Проверка баланса</h2>
                <form id="balance-form" class="inline-form">
                    <label>
                        Номер талона
                        <input type="text" id="balance-ticket" placeholder="TKT************" required>
                    </label>
                    <button type="submit">Проверить</button>
                </form>
                <p id="balance-result" class="result"></p>
            </div>

            <div class="card">
                <h2>Оплата</h2>
                <form id="pay-form">
                    <label>
                        Номер талона
                        <input type="text" id="pay-ticket" placeholder="coupon number" required>
                    </label>
                    <label>
                        Сумма
                        <input type="number" id="pay-amount" step="0.01" min="0.01" required>
                    </label>
                    <label>
                        Точка обслуживания
                        <select id="pay-point-id" required></select>
                    </label>
                    <button type="submit">Списать</button>
                </form>
                <p id="pay-result" class="result"></p>
            </div>
        </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script src="/js/app.js"></script>
</body>
</html>
